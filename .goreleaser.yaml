version: 2
project_name: modelith

builds:
  - id: modelith
    main: ./cmd/modelith
    binary: modelith
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: modelith
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - name: modelith
    homepage: "https://github.com/stacklok/modelith"
    description: "Tooling for authoring, validating, and rendering domain models"
    directory: Formula
    commit_author:
      name: stacklokbot
      email: info@stacklok.com
    repository:
      owner: stacklok
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    test: |
      system "#{bin}/modelith --version"

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: archive
    output: true
    signature: "${artifact}.sigstore.json"

changelog:
  use: github
  sort: asc

release:
  prerelease: auto

# The GoReleaser binary version is pinned in the release workflow
# (goreleaser-action `version:`), not floated, so releases are reproducible.
