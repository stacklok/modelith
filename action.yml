name: "Modelith"
description: "Lint domain-model YAML and verify the committed Markdown is up to date. Requires Linux or macOS runners (Windows not supported)."
branding:
  icon: "check-circle"
  color: "green"

inputs:
  files:
    description: "Domain-model YAML files or globs, space-, comma-, or newline-separated."
    required: true
  completeness:
    description: "Treat completeness gaps as 'warn' or 'error'."
    required: false
    default: "warn"
  check-rendered:
    description: "Verify the committed *.md output matches the YAML (render --check)."
    required: false
    default: "true"
  version:
    description: "modelith release to install, e.g. 'v0.4.0'. Bumped manually after each release — see CLAUDE.md's release checklist in the modelith repo."
    required: false
    default: "v0.4.0"

runs:
  using: "composite"
  steps:
    - name: Install modelith
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        os=$(uname -s | tr '[:upper:]' '[:lower:]')
        arch=$(uname -m)
        case "$arch" in
          x86_64) arch=amd64 ;;
          arm64 | aarch64) arch=arm64 ;;
          *) echo "::error::unsupported architecture: $arch"; exit 1 ;;
        esac

        base="https://github.com/stacklok/modelith/releases/download/${VERSION}"
        archive="modelith_${VERSION#v}_${os}_${arch}.tar.gz"
        workdir=$(mktemp -d)

        curl -sSfL -o "$workdir/$archive" "$base/$archive"
        curl -sSfL -o "$workdir/checksums.txt" "$base/checksums.txt"

        expected=$(grep " ${archive}\$" "$workdir/checksums.txt" | awk '{print $1}')
        if [ -z "$expected" ]; then
          echo "::error::no checksum entry found for $archive"
          exit 1
        fi
        actual=$(cd "$workdir" && { sha256sum "$archive" 2>/dev/null || shasum -a 256 "$archive"; } | awk '{print $1}')
        if [ "$expected" != "$actual" ]; then
          echo "::error::checksum mismatch for $archive: expected $expected, got $actual"
          exit 1
        fi

        tar -xzf "$workdir/$archive" -C "$workdir" modelith
        chmod +x "$workdir/modelith"
        mv "$workdir/modelith" "${{ runner.temp }}/modelith"

    - name: Lint and check
      shell: bash
      env:
        MODELITH: ${{ runner.temp }}/modelith
        FILES_INPUT: ${{ inputs.files }}
        COMPLETENESS: ${{ inputs.completeness }}
        CHECK_RENDERED: ${{ inputs.check-rendered }}
      run: |
        set -euo pipefail
        shopt -s globstar nullglob

        # Split the file list on commas/whitespace/newlines into glob patterns,
        # then expand each. No xargs — it would mangle quotes/backslashes; here we
        # just want plain word-splitting + globbing. (read -d '' returns non-zero
        # at EOF, hence the `|| true`.)
        IFS=$' \t\n,' read -rd '' -a patterns <<< "$FILES_INPUT" || true
        files=()
        for p in "${patterns[@]}"; do
          for f in $p; do files+=("$f"); done
        done
        if [ ${#files[@]} -eq 0 ]; then
          echo "::error::No files matched: $FILES_INPUT (did the workflow run actions/checkout before this step, and are the paths correct?)"
          exit 1
        fi
        echo "Linting: ${files[*]}"

        "$MODELITH" lint --completeness "$COMPLETENESS" "${files[@]}"

        # Accept common boolean spellings; fail loudly on anything unrecognized
        # rather than silently skipping the render check.
        case "${CHECK_RENDERED,,}" in
          true | yes | 1)
            for f in "${files[@]}"; do
              "$MODELITH" render --check "$f"
            done
            ;;
          false | no | 0 | "") ;;
          *)
            echo "::error::check-rendered must be true or false, got: $CHECK_RENDERED"
            exit 1
            ;;
        esac
