name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.sum
      - name: Check go.mod is tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Staticcheck
        # Pinned version (kept out of go.mod to avoid dragging its dep tree in).
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@25e2cdc5eb1d7a04fdc45ff538f1a00e960ae128 # v8.0.0
        with:
          version: v2.12.2
      - name: Test
        run: go test -race ./...
      - name: Build modelith
        run: go build -o "${{ runner.temp }}/modelith" ./cmd/modelith
      - name: Lint and render-check example models
        run: |
          set -euo pipefail
          shopt -s nullglob
          modelith="${{ runner.temp }}/modelith"
          files=(examples/*.modelith.yaml docs/05-parking-garage/*.modelith.yaml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No example models found"
            exit 1
          fi
          "$modelith" lint --completeness error "${files[@]}"
          for f in "${files[@]}"; do
            "$modelith" render --check "$f"
          done
      - name: Validate plugin manifest
        # Lightweight structural check (jq is preinstalled on ubuntu-latest). The
        # full `claude plugin validate ./plugin --strict` runs locally via
        # `task check`; we don't pull the Claude Code CLI into this Go pipeline.
        run: |
          set -euo pipefail
          shopt -s nullglob
          pj=plugin/.claude-plugin/plugin.json
          [ -f "$pj" ] || { echo "::error::missing $pj"; exit 1; }
          jq empty "$pj"
          jq -e '.name' "$pj" >/dev/null || { echo "::error::$pj missing required field: name"; exit 1; }
          skills=(plugin/skills/*/SKILL.md)
          [ ${#skills[@]} -gt 0 ] || { echo "::error::no skills found under plugin/skills/*/SKILL.md"; exit 1; }
          for s in "${skills[@]}"; do
            head -n 1 "$s" | grep -q '^---$' || { echo "::error::$s missing YAML frontmatter"; exit 1; }
          done
          echo "plugin manifest + ${#skills[@]} skill(s) OK"
