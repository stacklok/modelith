name: DCO

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Check Signed-off-by trailer on every commit
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git log --format=%H "$base..$head"); do
            if ! git log -1 --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a Signed-off-by trailer (DCO)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "See dco.md for how to sign off commits (git commit -s, git rebase --signoff)."
            exit 1
          fi
          echo "All commits have a valid DCO Signed-off-by trailer."
